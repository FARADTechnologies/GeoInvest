services:
  redis:
    image: redis:7-alpine
    container_name: geoinvest_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - geoinvest_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: geoinvest_backend
    environment:
      PYTHONPATH: /app
      APP_NAME: GeoInvest Analytics API
      ENVIRONMENT: production
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql+asyncpg://analitics:Sv4lSA5SeCwDv5p@62.171.172.225:5432/homora_dev_db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      RAW_DATA_CSV_PATH: /data/h3_analysis.csv
      BOUNDARIES_JSON_PATH: /data/baku_districts.json
      CACHE_TTL_SECONDS: 120
      SOURCE_DATABASE_URL: postgresql://analitics:Sv4lSA5SeCwDv5p@62.171.172.225:5432/homora_dev_db
    ports:
      - "8000:8000"
    volumes:
      - ../data:/data:ro
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: geoinvest_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_API_PREFIX: /api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  geoinvest_redis_data:
